name: Bruno Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start backend
        run: |
          ./mvnw spring-boot:run &
          sleep 20

      - name: Run Bruno tests
        run: |
          bru run bruno \
            --env environments/todo-dev-env.json \
            --reporter-json ci-report.json \
            --bail