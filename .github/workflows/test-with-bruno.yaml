name: Bruno Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Start backend + wait
        run: |
          ./gradlew bootRun &
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/todos || echo 0)
            if [ "$status" = "200" ]; then break; fi
            sleep 2
          done

      - name: Run Bruno tests
        run: |
          cd bruno
          bru run . \
            --env todo-dev-env \
            --bail